<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player VAST/VPAID</title>

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/videojs-ima@2.3.0/dist/videojs.ima.css" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #content_video { width: 100%; height: 100%; }
        .error-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; z-index: 9999;
        }
        .error-overlay.hidden { display: none; }
        .error-icon { font-size: 48px; margin-bottom: 20px; }
        .error-message { font-size: 16px; text-align: center; max-width: 80%; color: #ff6b6b; }
        .retry-btn {
            margin-top: 20px; padding: 10px 20px; background: #00d4ff;
            color: #000; border: none; border-radius: 6px; font-size: 14px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="error-overlay" class="error-overlay hidden">
        <div class="error-icon">&#9888;</div>
        <div class="error-message" id="error-message">Erro ao carregar o anuncio</div>
        <button class="retry-btn" onclick="location.reload()">Tentar Novamente</button>
    </div>

    <video id="content_video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline>
        <source src="https://storage.googleapis.com/interactive-media-ads/media/android.mp4" type="video/mp4">
    </video>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-ads@7.5.2/dist/videojs-contrib-ads.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-ima@2.3.0/dist/videojs.ima.min.js"></script>

    <script>
        // Parse URL params
        const params = new URLSearchParams(window.location.search);
        const vastUrl = params.get('vast') ? decodeURIComponent(params.get('vast')) : '';
        const vpaidMode = parseInt(params.get('vpaid') || '2');

        if (!vastUrl) {
            document.getElementById('error-message').textContent = 'Nenhuma tag VAST fornecida';
            document.getElementById('error-overlay').classList.remove('hidden');
        } else {
            // Create player and init IMA in the same tick
            var player = videojs('content_video');

            var options = {
                adTagUrl: vastUrl,
                vpaidMode: vpaidMode
            };

            player.ima(options);

            // On mobile, initializeAdDisplayContainer must be called on user action
            var startEvent = 'click';
            if (navigator.userAgent.match(/iPhone/i) || navigator.userAgent.match(/iPad/i) || navigator.userAgent.match(/Android/i)) {
                startEvent = 'touchend';
            }

            var initAdDisplayContainer = function() {
                player.ima.initializeAdDisplayContainer();
                wrapperDiv.removeEventListener(startEvent, initAdDisplayContainer);
            };

            var wrapperDiv = document.getElementById('content_video');
            wrapperDiv.addEventListener(startEvent, initAdDisplayContainer);

            // Error handling
            player.on('adserror', function(e) {
                console.error('[VAST Player] Ad error:', e);
                var msg = 'Erro ao carregar anuncio';
                if (e.data && e.data.AdError) {
                    msg = 'Erro: ' + e.data.AdError.getMessage();
                }
                document.getElementById('error-message').textContent = msg;
                document.getElementById('error-overlay').classList.remove('hidden');
            });

            player.on('ads-ad-started', function() {
                console.log('[VAST Player] Ad started');
                document.getElementById('error-overlay').classList.add('hidden');
            });

            console.log('[VAST Player] Initialized with tag:', vastUrl);
        }
    </script>
</body>
</html>
